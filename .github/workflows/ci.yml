name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  audit:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Tap this repo
        run: |
          mkdir -p "$(brew --repository)/Library/Taps/bandwidth"
          ln -s "$GITHUB_WORKSPACE" "$(brew --repository)/Library/Taps/bandwidth/homebrew-tap"

      - name: Audit formula
        run: brew audit --strict Formula/band.rb
